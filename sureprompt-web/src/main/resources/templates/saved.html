<!DOCTYPE html>
<html th:replace="~{layout/base :: html(~{::title}, ~{::headExtras}, ~{::content}, ~{::scripts})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Saved Prompts | SurePrompt</title>
    <th:block th:fragment="headExtras"></th:block>
</head>
<body>
<th:block th:fragment="content">
    <div class="saved-shell">
        <header class="page-header">
            <h1>Saved Prompt Workspace</h1>
            <p>Your private shortlist for reuse, experimentation, and team playbooks.</p>
        </header>

        <section class="saved-panel" style="padding: 16px; margin-bottom: 14px;" th:if="${collections != null && !collections.isEmpty()}">
            <h3 style="font-size: 1rem; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 6px;">
                <md-icon>folder</md-icon>
                Collections
            </h3>
            <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                <md-assist-chip th:each="collection : ${collections}" th:label="${collection.name}" elevated></md-assist-chip>
            </div>
        </section>

        <section class="prompts-grid">
            <article th:each="p : ${savedPrompts}" class="prompt-card">
                <md-ripple></md-ripple>
                <div class="card-header">
                    <div class="author-info">
                        <a th:href="@{/users/{username}(username=${p.authorUsername})}">
                            <img th:if="${p.authorAvatar}" th:src="${p.authorAvatar}" class="avatar-sm" alt="Avatar">
                            <div th:unless="${p.authorAvatar}" class="avatar-placeholder-sm" th:text="${#strings.substring(p.authorUsername,0,1).toUpperCase()}"></div>
                        </a>
                        <div class="author-details">
                            <a th:href="@{/users/{username}(username=${p.authorUsername})}" class="author-name" th:text="${p.authorName}">Author</a>
                            <span class="college-badge" th:if="${p.college}">
                                <md-icon style="font-size:14px;">school</md-icon>
                                <span th:text="${p.college}">College</span>
                            </span>
                        </div>
                    </div>
                    <div class="card-meta" th:text="${#temporals.format(p.createdAt, 'MMM dd')}">Jan 01</div>
                </div>

                <a th:href="@{/prompts/{id}(id=${p.id})}" class="card-title-link">
                    <h3 class="card-title" th:text="${p.title}">Prompt title</h3>
                </a>

                <div class="tags-container">
                    <md-assist-chip th:each="tag : ${p.tags}" th:label="${tag}" elevated></md-assist-chip>
                    <span class="difficulty-badge" th:if="${p.difficulty}"
                          th:classappend="${p.difficulty.name() == 'EASY' ? 'diff-easy' : (p.difficulty.name() == 'MEDIUM' ? 'diff-medium' : 'diff-hard')}"
                          th:text="${p.difficulty}">EASY</span>
                    <span class="platform-badge" th:if="${p.platform}" th:text="${p.platform}">ChatGPT</span>
                </div>

                <div class="ai-status" th:if="${p.aiVerified || p.aiScore != null}">
                    <span class="verified-badge" th:if="${p.aiVerified}"><md-icon style="font-size:16px;">verified</md-icon>Verified</span>
                    <span class="score-badge" th:if="${p.aiScore != null}" th:text="'AI Score ' + ${p.aiScore}">AI Score 8.0</span>
                </div>

                <div class="card-footer">
                    <div class="actions-left">
                        <md-icon-button class="like-btn" th:data-id="${p.id}" th:classappend="${p.liked ? 'active' : ''}">
                            <md-icon th:style="${p.liked ? 'font-variation-settings: FILL 1; color: var(--danger-color);' : ''}">favorite</md-icon>
                        </md-icon-button>
                        <span class="like-count" th:text="${p.likeCount}">0</span>
                    </div>
                    <div class="actions-right">
                        <md-icon-button class="save-btn" th:data-id="${p.id}" th:classappend="${p.saved ? 'active' : ''}">
                            <md-icon th:style="${p.saved ? 'font-variation-settings: FILL 1; color: var(--accent-color);' : ''}">bookmark</md-icon>
                        </md-icon-button>
                    </div>
                </div>
            </article>

            <div th:if="${savedPrompts == null || savedPrompts.isEmpty()}" class="empty-state" style="grid-column: 1 / -1;">
                <md-icon style="font-size:48px;">bookmark</md-icon>
                <p style="margin-top: 10px;">You have not saved any prompts yet.</p>
                <md-filled-button th:href="@{/explore}" onclick="window.location.href=this.getAttribute('href'); return false;" style="margin-top: 10px;">
                    <md-icon slot="icon">travel_explore</md-icon>
                    Explore prompts
                </md-filled-button>
            </div>
        </section>
    </div>
</th:block>

<th:block th:fragment="scripts">
    <script th:src="@{/js/prompt.js}"></script>
</th:block>
</body>
</html>
