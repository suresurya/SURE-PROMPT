<!DOCTYPE html>
<html th:replace="~{layout/base :: html(~{::title}, ~{::headExtras}, ~{::content}, ~{::scripts})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | SurePrompt</title>
    <th:block th:fragment="headExtras"></th:block>
</head>
<body>
<th:block th:fragment="content">
    <div class="auth-shell">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to manage your prompts, benchmarks, and saved workflows.</p>

            <div th:if="${error}" class="alert alert-danger">
                <md-icon>error</md-icon>
                <span th:text="${error}"></span>
            </div>

            <div th:if="${message}" class="alert" style="border-color: rgba(10, 138, 143, 0.3); background: rgba(10, 138, 143, 0.1); color: var(--accent-hover);">
                <md-icon>info</md-icon>
                <span th:text="${message}"></span>
            </div>

            <form th:action="@{/login}" method="post" id="loginForm">
                <div class="form-group">
                    <md-outlined-text-field
                        label="Username"
                        name="username"
                        type="text"
                        required
                        autofocus
                        autocomplete="username">
                        <md-icon slot="leading-icon">person</md-icon>
                    </md-outlined-text-field>
                </div>

                <div class="form-group">
                    <md-outlined-text-field
                        label="Password"
                        name="password"
                        type="password"
                        required
                        autocomplete="current-password">
                        <md-icon slot="leading-icon">lock</md-icon>
                    </md-outlined-text-field>
                </div>

                <div class="form-actions" style="justify-content: stretch;">
                    <md-filled-button type="submit" style="width: 100%;">
                        <md-icon slot="icon">login</md-icon>
                        Sign In
                    </md-filled-button>
                </div>
            </form>

            <md-divider style="margin: 20px 0 14px;"></md-divider>

            <div class="form-row" style="grid-template-columns: 1fr 1fr;">
                <md-outlined-button th:href="@{/oauth2/authorization/google}" onclick="window.location.href=this.getAttribute('href'); return false;">
                    <md-icon slot="icon">public</md-icon>
                    Google
                </md-outlined-button>
                <md-outlined-button th:href="@{/oauth2/authorization/github}" onclick="window.location.href=this.getAttribute('href'); return false;">
                    <md-icon slot="icon">code</md-icon>
                    GitHub
                </md-outlined-button>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="scripts"></th:block>
</body>
</html>
