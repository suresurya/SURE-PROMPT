<!DOCTYPE html>
<html th:replace="~{layout/base :: html(
    ~{::title},
    ~{::head-extras},
    ~{::content},
    ~{::scripts}
)}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - SurePrompt</title>
    <th:block th:fragment="head-extras">
        <style>
            .login-container {
                max-width: 400px;
                margin: 80px auto;
                text-align: center;
                background: var(--bg-surface);
                padding: 40px;
                border-radius: 16px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                border: 1px solid var(--border-color);
            }
            .login-logo {
                font-size: 2rem;
                font-weight: 700;
                margin-bottom: 10px;
            }
            .login-subtitle {
                color: var(--text-muted);
                margin-bottom: 40px;
            }
            .oauth-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 15px;
                width: 100%;
                padding: 14px;
                border-radius: 8px;
                font-weight: 500;
                font-size: 1.1rem;
                margin-bottom: 15px;
                text-decoration: none;
                transition: all 0.2s;
            }
            .google-btn {
                background: white;
                color: #333;
                border: 1px solid #ddd;
            }
            .google-btn:hover { background: #f1f1f1; }
            .github-btn {
                background: #24292e;
                color: white;
                border: 1px solid #111;
            }
            .github-btn:hover { background: #1b1f23; }
        </style>
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="login-container">
            <div class="login-logo" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <img th:src="@{/assets/logo.png}" alt="SurePrompt Logo" width="48" height="48" style="border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
                <span>Sure<span class="logo-accent">Prompt</span></span>
            </div>
            <p class="login-subtitle">The Free Technical Prompt Community</p>
            
            <a th:href="@{/login/oauth2/code/google}" class="oauth-btn google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="24" alt="Google">
                Continue with Google
            </a>
            
            <a th:href="@{/login/oauth2/code/github}" class="oauth-btn github-btn">
                <i class="fab fa-github" style="font-size: 24px;"></i>
                Continue with GitHub
            </a>
            
            <p style="margin-top:20px; font-size:12px; color:var(--text-muted)">
                By continuing, you agree to our Terms of Service and Privacy Policy.
            </p>
        </div>
    </th:block>
    
    <th:block th:fragment="scripts"></th:block>
</body>
</html>
