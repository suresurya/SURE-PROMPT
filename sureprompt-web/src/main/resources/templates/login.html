<!DOCTYPE html>
<html th:replace="~{layout/base :: html(~{::title}, ~{::headExtras}, ~{::content}, ~{::scripts})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - SurePrompt</title>
    <th:block th:fragment="headExtras">
        <style>
            .login-container {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 80vh;
                padding: 2rem 0;
            }
            .login-card {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                padding: 3rem;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
                transition: transform 0.3s ease;
            }
            .login-card:hover {
                transform: translateY(-5px);
            }
            .login-header {
                text-align: center;
                margin-bottom: 2.5rem;
            }
            .login-header h1 {
                font-size: 2.2rem;
                font-weight: 700;
                background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 0.5rem;
            }
            .login-header p {
                color: var(--text-muted);
                font-size: 1rem;
            }
            .form-group {
                margin-bottom: 1.5rem;
            }
            .form-label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 500;
                color: #e5e7eb;
            }
            .form-input {
                width: 100%;
                padding: 0.8rem 1rem;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 12px;
                color: white;
                font-size: 1rem;
                transition: all 0.3s ease;
            }
            .form-input:focus {
                outline: none;
                border-color: #6366f1;
                box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
                background: rgba(255, 255, 255, 0.06);
            }
            .btn-login {
                width: 100%;
                padding: 1rem;
                background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
                border: none;
                border-radius: 12px;
                color: white;
                font-weight: 600;
                font-size: 1.1rem;
                cursor: pointer;
                transition: all 0.3s ease;
                margin-top: 1rem;
            }
            .btn-login:hover {
                filter: brightness(110%);
                transform: scale(1.02);
            }
            .error-message {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.2);
                color: #f87171;
                padding: 0.8rem;
                border-radius: 10px;
                margin-bottom: 1.5rem;
                font-size: 0.9rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .social-login {
                margin-top: 2rem;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                padding-top: 2rem;
                text-align: center;
            }
            .social-buttons {
                display: flex;
                gap: 1rem;
                margin-top: 1rem;
            }
            .btn-social {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.8rem;
                padding: 0.8rem;
                border-radius: 12px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: white;
                text-decoration: none;
                font-size: 0.9rem;
                transition: all 0.3s ease;
            }
            .btn-social:hover {
                background: rgba(255, 255, 255, 0.1);
            }
        </style>
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Welcome Back</h1>
                    <p>Elevate your AI productivity</p>
                </div>

                <div th:if="${error}" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                </div>

                <div th:if="${message}" class="alert alert-info mb-4" style="color: #60a5fa">
                    <i class="fas fa-info-circle mr-2"></i>
                    <span th:text="${message}"></span>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" id="username" name="username" class="form-input" 
                               placeholder="e.g. admin" required autofocus>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-input" 
                               placeholder="Your secret code" required>
                    </div>

                    <button type="submit" class="btn-login">Sign In</button>
                </form>

                <div class="social-login">
                    <p class="text-muted">Or continue with</p>
                    <div class="social-buttons">
                        <a th:href="@{/oauth2/authorization/google}" class="btn-social">
                            <i class="fab fa-google"></i> Google
                        </a>
                        <a th:href="@{/oauth2/authorization/github}" class="btn-social">
                            <i class="fab fa-github"></i> GitHub
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </th:block>
    
    <th:block th:fragment="scripts">
        <!-- Optional scripts -->
    </th:block>
</body>
</html>
