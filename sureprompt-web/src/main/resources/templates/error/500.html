<!DOCTYPE html>
<html th:replace="~{layout/base :: html(
    ~{::title},
    ~{::head-extras},
    ~{::content},
    ~{::scripts}
)}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>500 Internal Error - SurePrompt</title>
    <th:block th:fragment="head-extras"></th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div style="text-align: center; padding: 100px 20px;">
            <md-icon style="font-size: 5rem; color: var(--danger-color); display: block; margin-bottom: 16px;">error_outline</md-icon>
            <h1 style="font-size: 4rem; font-weight: 800; color: var(--danger-color); margin-bottom: 8px;">500</h1>
            <h2 style="margin-bottom: 12px;">Oops, something went wrong.</h2>
            <p class="text-muted" style="margin-bottom: 32px;" th:text="${error != null ? error : 'We are having some technical issues. Please try again later.'}"></p>
            <md-filled-button th:href="@{/}" onclick="window.location.href='/'; return false;">
                <md-icon slot="icon">home</md-icon>
                Go Home
            </md-filled-button>
        </div>
    </th:block>
    <th:block th:fragment="scripts"></th:block>
</body>
</html>
