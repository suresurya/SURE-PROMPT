<!DOCTYPE html>
<html th:replace="~{layout/base :: html(
    ~{::title},
    ~{::head-extras},
    ~{::content},
    ~{::scripts}
)}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>404 Not Found - SurePrompt</title>
    <th:block th:fragment="head-extras"></th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="error-container text-center" style="padding: 100px 20px;">
            <h1 style="font-size: 5rem; color: var(--accent-color);">404</h1>
            <h2>Prompt Not Found</h2>
            <p class="text-muted" th:text="${error != null ? error : 'The page you are looking for does not exist.'}"></p>
            <a th:href="@{/}" class="btn btn-primary mt-4">Go Home</a>
        </div>
    </th:block>
    <th:block th:fragment="scripts"></th:block>
</body>
</html>
