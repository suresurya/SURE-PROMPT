<!DOCTYPE html>
<html lang="en" th:fragment="html(title, headExtras, content, scripts)" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">SurePrompt</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <th:block th:replace="${headExtras}"></th:block>
</head>
<body>

    <div th:replace="~{layout/navbar :: navbar}"></div>

    <!-- Alert for success messages -->
    <div th:if="${successMessage}" class="alert-success">
        <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
    </div>

    <main class="container">
        <th:block th:replace="${content}"></th:block>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>

    <script th:src="@{/js/main.js}"></script>
    <th:block th:replace="${scripts}"></th:block>
</body>
</html>
