<!DOCTYPE html>
<html th:replace="~{layout/base :: html(
    ~{::title},
    ~{::head-extras},
    ~{::content},
    ~{::scripts}
)}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Post a Prompt - SurePrompt</title>
    <th:block th:fragment="head-extras">
        <link rel="stylesheet" th:href="@{/css/form.css}">
        <!-- Select2 for better tag selection -->
        <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="form-container">
            <h2>Post a Prompt</h2>
            <p class="subtitle">Share a prompt that worked great for you.</p>
            
            <form th:action="@{/prompts/new}" th:object="${createPromptRequest}" method="post" id="postPromptForm">
                
                <div class="form-group">
                    <label for="title">Title <span class="required">*</span></label>
                    <input type="text" id="title" th:field="*{title}" placeholder="e.g. A clear explanation of Dijkstra's Algorithm">
                    <div class="error-msg" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>
                
                <div class="form-row">
                    <div class="form-group half">
                        <label for="difficulty">Difficulty <span class="required">*</span></label>
                        <select id="difficulty" th:field="*{difficulty}">
                            <option value="EASY">Easy</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HARD">Hard</option>
                        </select>
                        <div class="error-msg" th:if="${#fields.hasErrors('difficulty')}" th:errors="*{difficulty}"></div>
                    </div>
                    
                    <div class="form-group half">
                        <label for="platform">AI Platform Used <span class="required">*</span></label>
                        <select id="platform" th:field="*{platform}">
                            <option value="ChatGPT (GPT-4)">ChatGPT (GPT-4)</option>
                            <option value="ChatGPT (GPT-3.5)">ChatGPT (GPT-3.5)</option>
                            <option value="Claude 3 Opus">Claude 3 Opus</option>
                            <option value="Claude 3 Sonnet">Claude 3 Sonnet</option>
                            <option value="Gemini Advanced">Gemini Advanced</option>
                            <option value="GitHub Copilot">GitHub Copilot</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="error-msg" th:if="${#fields.hasErrors('platform')}" th:errors="*{platform}"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="tags">Topic Tags (1-5) <span class="required">*</span></label>
                    <select id="tags" th:field="*{tags}" multiple="multiple" class="tag-select">
                        <option th:each="t : ${availableTags}" th:value="${t}" th:text="${t}"></option>
                    </select>
                    <div class="error-msg" th:if="${#fields.hasErrors('tags')}" th:errors="*{tags}"></div>
                </div>
                
                <div class="form-group">
                    <div class="label-with-action">
                        <label for="promptBody">The Exact Prompt <span class="required">*</span></label>
                    </div>
                    <textarea id="promptBody" th:field="*{promptBody}" rows="6" placeholder="Paste the exact prompt you sent to the AI..."></textarea>
                    <div class="error-msg" th:if="${#fields.hasErrors('promptBody')}" th:errors="*{promptBody}"></div>
                </div>
                
                <div class="form-group">
                    <label for="aiOutput">AI Output <span class="required">*</span></label>
                    <textarea id="aiOutput" th:field="*{aiOutput}" rows="10" placeholder="Paste the response you received..."></textarea>
                    <div class="error-msg" th:if="${#fields.hasErrors('aiOutput')}" th:errors="*{aiOutput}"></div>
                </div>
                
                <div class="form-actions">
                    <a th:href="@{/}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">Publish Prompt</button>
                </div>
            </form>
        </div>
    </th:block>
    
    <th:block th:fragment="scripts">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
        <script th:src="@{/js/post.js}"></script>
    </th:block>
</body>
</html>
