<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Post a Prompt - SURE PROMPT</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        textarea {
            min-height: 150px;
        }
        button {
            padding: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div th:replace="~{layout/navbar :: navbar}"></div>
    
    <div class="container">
        <h1>Post a Prompt</h1>
        <form th:action="@{/prompts/new}" method="post">
            <input type="text" name="title" placeholder="Title" required />
            
            <textarea name="promptBody" placeholder="Prompt"></textarea>
            
            <textarea name="aiOutput" placeholder="AI Output"></textarea>
        
            <!-- Added tags dropdown to avoid validation errors from CreatePromptRequest if needed, though they aren't strictly required in the user's snippet. But the request requires a List of Strings -> empty by default if not bound -->
            <button type="submit">Post</button>
        </form>
    </div>
</body>
</html>
