<!DOCTYPE html>
<html th:replace="~{layout/base :: html(~{::title}, ~{::headExtras}, ~{::content}, ~{::scripts})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Publish Prompt | SurePrompt</title>
    <th:block th:fragment="headExtras"></th:block>
</head>
<body>
<th:block th:fragment="content">
    <div class="editor-layout">
        <header class="page-header">
            <h1>Publish a Prompt Blueprint</h1>
            <p>Create a reusable prompt workflow with baseline output and quality metadata.</p>
        </header>

        <form th:action="@{/prompts/new}" method="post" class="editor-card" id="postPromptForm">
            <div class="form-group">
                <md-outlined-text-field
                    name="title"
                    label="Prompt title"
                    maxlength="200"
                    required
                    supporting-text="Use a specific outcome-focused title.">
                    <md-icon slot="leading-icon">title</md-icon>
                </md-outlined-text-field>
            </div>

            <div class="form-group">
                <md-outlined-text-field
                    name="promptBody"
                    label="Prompt template"
                    type="textarea"
                    rows="9"
                    required
                    supporting-text="Use placeholders like {context}, {audience}, and {constraints}.">
                    <md-icon slot="leading-icon">terminal</md-icon>
                </md-outlined-text-field>
            </div>

            <div class="form-group">
                <md-outlined-text-field
                    name="aiOutput"
                    label="Sample AI output"
                    type="textarea"
                    rows="7"
                    required
                    supporting-text="Paste a representative output from the target model.">
                    <md-icon slot="leading-icon">smart_toy</md-icon>
                </md-outlined-text-field>
            </div>

            <md-divider style="margin: 8px 0 18px;"></md-divider>

            <div class="field-grid">
                <md-outlined-select name="difficulty" label="Difficulty" required>
                    <md-select-option value="EASY">
                        <div slot="headline">Easy</div>
                    </md-select-option>
                    <md-select-option value="MEDIUM" selected>
                        <div slot="headline">Medium</div>
                    </md-select-option>
                    <md-select-option value="HARD">
                        <div slot="headline">Hard</div>
                    </md-select-option>
                </md-outlined-select>

                <md-outlined-select name="platform" label="Platform" required>
                    <md-select-option value="ChatGPT"><div slot="headline">ChatGPT</div></md-select-option>
                    <md-select-option value="Gemini"><div slot="headline">Gemini</div></md-select-option>
                    <md-select-option value="Claude"><div slot="headline">Claude</div></md-select-option>
                    <md-select-option value="Copilot"><div slot="headline">Copilot</div></md-select-option>
                    <md-select-option value="Other"><div slot="headline">Other</div></md-select-option>
                </md-outlined-select>
            </div>

            <div class="form-group" style="margin-top: 16px;">
                <label style="font-weight: 700; display: block; margin-bottom: 8px;">Tags (1-5)</label>
                <div class="tag-chip-wrap" id="tagsContainer">
                    <input type="text" id="tagInput" placeholder="Type a tag and press Enter" maxlength="30">
                </div>
                <div id="hiddenTagInputs"></div>
                <p class="helper-text">Press Enter or comma to add a tag, then backspace to adjust quickly.</p>
            </div>

            <md-linear-progress id="submitProgress" indeterminate class="hidden" style="margin-top: 4px;"></md-linear-progress>

            <div class="submit-section">
                <md-outlined-button type="button" onclick="window.history.back()">Cancel</md-outlined-button>
                <md-filled-button type="submit" id="submitBtn">
                    <md-icon slot="icon">publish</md-icon>
                    Publish Prompt
                </md-filled-button>
            </div>
        </form>
    </div>
</th:block>

<th:block th:fragment="scripts">
    <script>
        const tagsContainer = document.getElementById('tagsContainer');
        const tagInput = document.getElementById('tagInput');
        const hiddenTagInputs = document.getElementById('hiddenTagInputs');
        let tags = [];

        function updateHiddenInputs() {
            hiddenTagInputs.innerHTML = '';
            tags.forEach((tag) => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'tags';
                input.value = tag;
                hiddenTagInputs.appendChild(input);
            });
        }

        function removeTag(tag, chip) {
            tags = tags.filter((t) => t !== tag);
            chip.remove();
            updateHiddenInputs();
        }

        function addTag(rawTag) {
            const tag = rawTag.replace(/,/g, '').trim();
            if (!tag || tags.includes(tag) || tags.length >= 5) {
                return;
            }

            tags.push(tag);
            const chip = document.createElement('md-input-chip');
            chip.label = tag;
            chip.addEventListener('remove', () => removeTag(tag, chip));
            tagsContainer.insertBefore(chip, tagInput);
            tagInput.value = '';
            updateHiddenInputs();
        }

        tagInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ',') {
                event.preventDefault();
                addTag(tagInput.value);
            }
        });

        document.getElementById('postPromptForm').addEventListener('submit', (event) => {
            if (tags.length === 0) {
                event.preventDefault();
                App.showToast('Add at least one tag before publishing.', 'error');
                return;
            }

            document.getElementById('submitProgress').classList.remove('hidden');
            document.getElementById('submitBtn').disabled = true;
        });
    </script>
</th:block>
</body>
</html>
