<!DOCTYPE html>
<html th:replace="~{layout/base :: html(
    ~{::title},
    ~{::head-extras},
    ~{::content},
    ~{::scripts}
)}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${profile.displayName} + ' - SurePrompt'">Profile</title>
    <th:block th:fragment="head-extras">
        <link rel="stylesheet" th:href="@{/css/profile.css}">
    </th:block>
</head>
<body>
    <th:block th:fragment="content">
        <div class="profile-header">
            <div class="profile-main">
                <img th:if="${profile.avatarUrl}" th:src="${profile.avatarUrl}" class="avatar-lg">
                <div th:unless="${profile.avatarUrl}" class="avatar-placeholder-lg" th:text="${#strings.substring(profile.username,0,1).toUpperCase()}"></div>
                
                <div class="profile-info">
                    <h1 th:text="${profile.displayName}">Name</h1>
                    <div class="profile-meta">
                        <span class="username" th:text="'@' + ${profile.username}">@user</span>
                        <span class="college" th:if="${profile.college}"><i class="fas fa-university"></i> <span th:text="${profile.college}"></span></span>
                    </div>
                    <p class="bio" th:if="${profile.bio}" th:text="${profile.bio}"></p>
                </div>
                
                <div class="profile-actions">
                    <a th:if="${profile.isOwnProfile}" th:href="@{/profile/edit}" class="btn btn-outline"><i class="fas fa-edit"></i> Edit Profile</a>
                    <button th:unless="${profile.isOwnProfile}" class="btn follow-btn" th:classappend="${profile.isFollowing ? 'btn-outline' : 'btn-primary'}" th:data-id="${profile.userId}">
                        <span th:text="${profile.isFollowing ? 'Following' : 'Follow'}"></span>
                    </button>
                </div>
            </div>
            
            <div class="profile-stats">
                <div class="stat-box">
                    <div class="stat-value" th:text="${profile.totalPrompts}">0</div>
                    <div class="stat-label">Prompts</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" th:text="${profile.totalLikes}">0</div>
                    <div class="stat-label">Likes</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" th:text="${profile.streakCount}">0</div>
                    <div class="stat-label"><i class="fas fa-fire text-danger"></i> Streak</div>
                </div>
            </div>
            
            <!-- Badges preview for phase 2 -->
            <div class="profile-badges" th:if="${profile.totalPrompts > 5}">
                <h3>Badges</h3>
                <div class="badge-row">
                    <div class="badge expert-badge" title="Expert Creator"><i class="fas fa-star"></i> Pro Contributor</div>
                </div>
            </div>
        </div>
        
        <div class="profile-content mt-4">
            <div class="section-header">
                <h2>Prompts</h2>
            </div>
            
            <div class="prompts-grid">
                <th:block th:each="prompt : ${userPrompts.prompts}">
                    <div th:replace="~{layout/prompt-card :: prompt-card(prompt=${prompt})}"></div>
                </th:block>
                <div th:if="${userPrompts.prompts.empty}" class="empty-state">
                    This user hasn't posted any prompts yet.
                </div>
            </div>
            
            <div class="pagination" th:if="${userPrompts.totalPages > 1}">
                <a th:if="${userPrompts.currentPage > 0}" th:href="@{/users/{un}(un=${profile.username}, page=${userPrompts.currentPage - 1})}" class="btn btn-outline sm">&laquo; Prev</a>
                <span th:text="'Page ' + (${userPrompts.currentPage + 1}) + ' of ' + ${userPrompts.totalPages}"></span>
                <a th:if="${userPrompts.currentPage < userPrompts.totalPages - 1}" th:href="@{/users/{un}(un=${profile.username}, page=${userPrompts.currentPage + 1})}" class="btn btn-outline sm">Next &raquo;</a>
            </div>
        </div>
    </th:block>
    
    <th:block th:fragment="scripts">
        <script th:src="@{/js/prompt.js}"></script>
    </th:block>
</body>
</html>
