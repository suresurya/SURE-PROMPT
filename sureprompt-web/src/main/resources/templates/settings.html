<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Settings - SURE PROMPT</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/prompt.css}">
    <style>
        .settings-container {
            max-width: 600px;
            margin: 3rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-primary {
            background: #007bff;
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
        .status-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .status-connected {
            background: #e6f4ea;
            color: #1e8e3e;
        }
        .status-missing {
            background: #fce8e6;
            color: #d93025;
        }
        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div th:replace="~{layout/navbar :: navbar}"></div>

    <div class="settings-container">
        <h2>System Settings</h2>
        <p style="color: #666; margin-bottom: 2rem;">Manage your API integrations and platform preferences.</p>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <h3>AI Integration</h3>
        
        <div th:if="${hasKey}" class="status-badge status-connected">
            ✅ Gemini API Key Connected
        </div>
        <div th:unless="${hasKey}" class="status-badge status-missing">
            ❌ No API Key Connected
        </div>

        <form method="post" th:action="@{/settings/api-key}">
            <div class="form-group">
                <label for="key">Google Gemini API Key</label>
                <input type="text" id="key" name="key" placeholder="Enter your Gemini API Key starting with AIza..." required minlength="20">
                <small style="display: block; margin-top: 0.5rem; color: #888;">
                    Keys are locally encrypted using AES-256 before storage. We cannot see your raw key.
                </small>
            </div>
            <button type="submit" class="btn-primary">
                <span th:text="${hasKey ? 'Update Key' : 'Save Key'}">Save Key</span>
            </button>
        </form>
    </div>
</body>
</html>
